<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#061a2e"/>
    </linearGradient>
    <linearGradient id="drop" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#90e0ef"/>
      <stop offset="55%" stop-color="#48cae4"/>
      <stop offset="100%" stop-color="#0096c7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#48cae4" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#48cae4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#48cae4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Soft glow behind drop on the left -->
  <ellipse cx="225" cy="250" rx="320" ry="260" fill="url(#glow)"/>

  <!-- Subtle ripple rings under drop -->
  <circle cx="225" cy="370" r="80" fill="none" stroke="#48cae4" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="225" cy="370" r="120" fill="none" stroke="#48cae4" stroke-opacity="0.10" stroke-width="2"/>
  <circle cx="225" cy="370" r="160" fill="none" stroke="#48cae4" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Water drop, left side -->
  <g transform="translate(225 240) scale(13) translate(-12 -12)">
    <path d="M12 2c-2 4-5 7-5 11a5 5 0 0 0 10 0c0-4-3-7-5-11z" fill="url(#drop)"/>
    <ellipse cx="9.8" cy="11.5" rx="1.4" ry="2.2" fill="#ffffff" fill-opacity="0.35"/>
  </g>

  <!-- Wordmark + tagline, right side -->
  <g font-family="-apple-system, Segoe UI, Roboto, sans-serif" fill="#ffffff">
    <text x="430" y="225" font-size="92" font-weight="700" letter-spacing="-2">PoolDose</text>
    <text x="432" y="285" font-size="30" font-weight="500" fill="#90e0ef">Pool Chemistry, Solved.</text>
    <text x="432" y="345" font-size="20" font-weight="400" fill="#cfe9f1" opacity="0.85">LSI · Dosing · History · Offline</text>
  </g>
</svg>
