<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#061a2e"/>
    </linearGradient>
    <linearGradient id="drop" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#90e0ef"/>
      <stop offset="55%" stop-color="#48cae4"/>
      <stop offset="100%" stop-color="#0096c7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#48cae4" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#48cae4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#48cae4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="2732" height="2732" fill="url(#bg)"/>

  <!-- Ambient glow centered (safe zone for splash is ~33% center on all platforms) -->
  <circle cx="1366" cy="1366" r="900" fill="url(#glow)"/>

  <!-- Centered drop, scaled to fit splash safe zone -->
  <g transform="translate(1366 1366) scale(36) translate(-12 -12)">
    <path d="M12 2c-2 4-5 7-5 11a5 5 0 0 0 10 0c0-4-3-7-5-11z" fill="url(#drop)"/>
    <ellipse cx="9.8" cy="11.5" rx="1.4" ry="2.2" fill="#ffffff" fill-opacity="0.35"/>
  </g>
</svg>
